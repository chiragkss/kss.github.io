<!DOCTYPE html>
<html>
<head>
  <title>Krishna Networks</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f7fa;
      text-align: center;
    }

    header {
      background: #0d6efd;
      color: white;
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    .plans {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      width: 220px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .price {
      font-size: 22px;
      color: #0d6efd;
      margin: 10px 0;
    }

    .btn {
      display: inline-block;
      padding: 10px 15px;
      background: #0d6efd;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      margin-top: 10px;
    }

    .contact {
      margin-top: 30px;
      font-size: 18px;
    }

    /* WhatsApp Floating Button */
    .whatsapp {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #25D366;
      color: white;
      padding: 15px;
      border-radius: 50%;
      font-size: 20px;
      text-decoration: none;
    }
  </style>
</head>

<body>

<header>
  Krishna Networks 🚀
</header>

<div class="container">

  <h2>Fast & Reliable Internet Service</h2>

  <div class="plans">

    <div class="card">
      <h3>50 Mbps</h3>
      <div class="price">₹499</div>
      <a class="btn" href="#">Buy Now</a>
    </div>

    <div class="card">
      <h3>100 Mbps</h3>
      <div class="price">₹699</div>
      <a class="btn" href="#">Buy Now</a>
    </div>

    <div class="card">
      <h3>200 Mbps</h3>
      <div class="price">₹999</div>
      <a class="btn" href="#">Buy Now</a>
    </div>

  </div>

  <div class="contact">
    📞 Call: 9545425678
  </div>

</div>

<!-- WhatsApp Button -->
<a class="whatsapp" href="https://wa.me/919545425678">💬</a>

</body>
</html>
